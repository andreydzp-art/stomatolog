# Деплой nkolesnik.com по SFTP (FASTPANEL). Секреты — в репозитории stomatolog.
name: Deploy to nkolesnik.com

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'image-slot.js'
      - 'images/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-nkolesnik
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ./
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.github/**
            **/docs/**
            README.md
            CURSOR.md
            CNAME
            .nojekyll
            stoma-deploy.zip

      - name: Smoke nkolesnik.com
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            html=$(curl -fsSL --max-time 25 "https://nkolesnik.com/" || true)
            if echo "$html" | grep -q 'Композитные виниры\|composite-veneers\|instrument-serif'; then
              echo "=== smoke OK ==="
              exit 0
            fi
            echo "attempt $i: waiting..."
            sleep 5
          done
          echo "=== smoke FAILED — check https://nkolesnik.com/ ==="
          exit 1
