# Деплой nkolesnik.com на VPS (FastPanel). Секреты — в ЭТОМ репозитории (stomatolog).
name: Deploy to nkolesnik.com

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'image-slot.js'
      - 'images/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-nkolesnik
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rsync → nkolesnik.com docroot
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER_IN: nkolesnik_co_usr
          DEPLOY_HOST_IN: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          DEPLOY_USER=$(trim "${DEPLOY_USER_IN:-}")
          DEPLOY_HOST=$(trim "${DEPLOY_HOST_IN:-}")
          if [ -z "$SSH_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "Добавьте Secrets в stomatolog: DEPLOY_HOST, DEPLOY_SSH_KEY (см. docs/DEPLOY.md)"
            exit 1
          fi
          install -d -m 700 ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_BASE=(ssh -i "${HOME}/.ssh/deploy_key" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -l "$DEPLOY_USER")

          echo "=== discover docroot (${DEPLOY_USER}) ==="
          DEST=$("${SSH_BASE[@]}" "$DEPLOY_HOST" 'set -e
            for c in \
              "$HOME/data/www/nkolesnik.com/public_html" \
              "$HOME/data/www/nkolesnik.com" \
              /var/www/nkolesnik_co_usr/data/www/nkolesnik.com/public_html \
              /var/www/nkolesnik_co_usr/data/www/nkolesnik.com; do
              if [ -d "$c" ]; then echo "$c"; exit 0; fi
            done
            if [ -d "$HOME/data/www" ]; then
              site=$(ls -1 "$HOME/data/www" 2>/dev/null | head -1 || true)
              if [ -n "$site" ] && [ -d "$HOME/data/www/$site" ]; then
                echo "$HOME/data/www/$site"; exit 0
              fi
            fi
            echo "ERROR: docroot not found" >&2
            ls -la "$HOME/data/www/" >&2 || true
            exit 1')
          echo "=== docroot=$DEST ==="

          RSYNC_SSH="ssh -i ${HOME}/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -l \"$DEPLOY_USER\""
          rsync -az --delete \
            -e "$RSYNC_SSH" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'docs/' \
            --exclude 'README.md' \
            --exclude 'CURSOR.md' \
            --exclude 'CNAME' \
            ./ \
            "${DEPLOY_HOST}:${DEST}/"
          echo "=== rsync OK ==="

      - name: Smoke nkolesnik.com
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            html=$(curl -fsSL --max-time 25 "https://nkolesnik.com/" || true)
            if echo "$html" | grep -q 'Композитные виниры'; then
              echo "=== smoke OK ==="
              exit 0
            fi
            sleep 5
          done
          echo "=== smoke FAILED ==="
          exit 1
