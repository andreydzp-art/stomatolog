
<!-- ============ DOCTOR QUOTE ============ -->
<style>
  .doctor-quote{
    background:var(--bg);
    padding:54px 0 62px;
  }
  @media (min-width:1200px){
    .doctor-quote{padding:40px 0 48px}
  }
  @media (max-width:720px){
    .doctor-quote{padding:42px 0 48px}
  }
  .doctor-quote__label{
    font-size:11px;
    letter-spacing:.17em;
    text-transform:uppercase;
    color:var(--ink-mute);
    margin:0 auto 24px;
    max-width:920px;
  }
  .doctor-quote__label::before{
    content:"";
    display:inline-block;
    width:28px;height:1px;
    background:var(--gold);
    vertical-align:middle;
    margin-right:14px;
    opacity:.65;
  }
  .doctor-quote__inner{
    display:grid;
    grid-template-columns:minmax(40px,60px) minmax(0,1fr);
    gap:18px 44px;
    align-items:start;
    max-width:920px;
    margin:0 auto;
  }
  @media (max-width:720px){
    .doctor-quote__inner{
      grid-template-columns:32px 1fr;
      gap:10px 16px;
    }
  }
  .doctor-quote__mark{
    font-family:var(--serif);
    font-size:clamp(60px,7vw,88px);
    line-height:.78;
    font-weight:400;
    color:var(--gold);
    opacity:.28;
    letter-spacing:-0.06em;
    margin-top:2px;
    user-select:none;
  }
  .doctor-quote__content{
    margin:0;
    padding:0;
    border:0;
    max-width:760px;
  }
  .doctor-quote__text{
    font-family:var(--serif);
    font-size:clamp(20px,1.7vw,24px);
    line-height:1.46;
    letter-spacing:-.012em;
    color:var(--ink);
  }
  .doctor-quote__text p{
    margin:0;
  }
  .doctor-quote__text p + p{
    margin-top:.9em;
  }
  .doctor-quote__text em{
    font-style:italic;
    color:var(--ink-soft);
  }
</style>
<section class="doctor-quote" aria-labelledby="doctor-quote-title">
  <div class="wrap">
    <p class="doctor-quote__label reveal" id="doctor-quote-title">Личный подход врача</p>
    <div class="doctor-quote__inner reveal">
      <div class="doctor-quote__mark" aria-hidden="true">“</div>
      <blockquote class="doctor-quote__content">
        <div class="doctor-quote__text">
          <p>Современная стоматология — это сочетание точности, эстетики и&nbsp;человеческого отношения.</p>
          <p><em>Поэтому я всегда стараюсь</em> сделать лечение максимально понятным, спокойным и&nbsp;комфортным.</p>
        </div>
      </blockquote>
    </div>
  </div>
</section>
