
<!-- ============ DOCTOR QUOTE ============ -->
<style>
  .doctor-quote{
    background:var(--bg);
    padding:30px 0 44px;
  }
  @media (min-width:1200px){
    .doctor-quote{padding:20px 0 36px}
  }
  @media (max-width:720px){
    .doctor-quote{padding:24px 0 36px}
  }
  .doctor-quote__label{
    font-size:11px;
    letter-spacing:.17em;
    text-transform:uppercase;
    color:var(--ink-mute);
    margin:0 auto 18px;
    max-width:650px;
  }
  .doctor-quote__label::before{
    content:"";
    display:inline-block;
    width:28px;height:1px;
    background:var(--gold);
    vertical-align:middle;
    margin-right:14px;
    opacity:.65;
  }
  .doctor-quote__content{
    margin:0 auto;
    padding:0;
    border:0;
    max-width:650px;
  }
  .doctor-quote__text{
    font-family:var(--serif);
    font-size:clamp(20px,1.55vw,23px);
    line-height:1.45;
    letter-spacing:-.012em;
    color:var(--ink);
  }
  .doctor-quote__text p{
    margin:0;
  }
  .doctor-quote__text p + p{
    margin-top:.85em;
  }
  .doctor-quote__text em{
    font-style:italic;
    color:var(--ink-soft);
  }
</style>
<section class="doctor-quote" aria-labelledby="doctor-quote-title">
  <div class="wrap">
    <p class="doctor-quote__label reveal" id="doctor-quote-title">Личный подход врача</p>
    <blockquote class="doctor-quote__content reveal">
      <div class="doctor-quote__text">
        <p>Для меня хорошая стоматология — это не только качественное лечение.</p>
        <p><em>Это когда пациент</em> чувствует себя спокойно, понимает каждый этап и&nbsp;уверен в&nbsp;результате.</p>
      </div>
    </blockquote>
  </div>
</section>
